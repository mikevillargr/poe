version: '3.9'

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://poeuser:poe_secure_password_2026@db:5432/poe
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-api03-placeholder}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
      - NODE_ENV=development
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=poe
      - POSTGRES_USER=poeuser
      - POSTGRES_PASSWORD=poe_secure_password_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poeuser -d poe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
